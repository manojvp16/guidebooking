<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head('Book Guide')}"/>
</head>
<body>
<th:block th:replace="~{fragments :: navbar}"/>

<div class="page-header">
    <div class="container">
        <p><a th:href="@{/guide/{id}(id=${guide.id})}" style="color:rgba(255,255,255,.7);">← Back to Guide</a></p>
        <h1>Book Your Tour</h1>
    </div>
</div>

<section class="section" style="padding-top:2rem;">
    <div class="container" style="max-width:600px;">

        <!-- Guide summary -->
        <div style="background:var(--white);border-radius:var(--radius-lg);padding:1.4rem 1.6rem;
                border:1px solid var(--border);box-shadow:var(--shadow-sm);
                display:flex;gap:1rem;align-items:center;margin-bottom:2rem;">
            <div style="font-size:3rem;">🧭</div>
            <div>
                <h3 style="margin:0;" th:text="${guide.name}">Guide</h3>
                <p style="color:var(--text-muted);font-size:.87rem;margin:.2rem 0;">
                    📍 <span th:text="${guide.city}"></span> &nbsp;·&nbsp;
                    🗣️ <span th:text="${guide.language}"></span> &nbsp;·&nbsp;
                    ₹<span th:text="${guide.price}"></span>/day
                </p>
            </div>
        </div>

        <div class="form-card" style="max-width:100%;">
            <h3 style="margin-bottom:1.5rem;">Select Tour Date</h3>

            <form th:action="@{/book/{id}(id=${guide.id})}" th:object="${booking}" method="post">
<!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->
                <div class="form-group">
                    <label>Tour Date</label>
                    <input type="date" th:field="*{bookingDate}" required/>
                </div>
                <div style="background:var(--ivory-dark);border-radius:var(--radius);padding:1rem;
                    font-size:.87rem;color:var(--text-muted);margin-bottom:1.5rem;border:1px solid var(--border);">
                    ℹ️ Your booking request will be sent to the guide for approval.
                    Payment is only required after the guide accepts.
                </div>
                <button type="submit" class="btn btn-gold btn-lg" style="width:100%;justify-content:center;">
                    📅 Confirm Booking Request
                </button>
            </form>
        </div>
    </div>
</section>

<th:block th:replace="~{fragments :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
