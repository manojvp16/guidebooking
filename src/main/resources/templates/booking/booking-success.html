<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head('Booking Successful')}"/>
    <style>
        @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
        .success-icon { animation: pop .4s ease both; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments :: navbar}"/>

<section class="section">
    <div class="container" style="max-width:480px;">
        <div class="form-card" style="max-width:100%;text-align:center;padding:3rem;">
            <div class="success-icon"
                 style="width:90px;height:90px;background:linear-gradient(135deg,#d1e7dd,#a3cfbb);
                  border-radius:50%;display:flex;align-items:center;justify-content:center;
                  font-size:2.5rem;margin:0 auto 1.5rem;">🎉</div>
            <h2>Booking Submitted!</h2>
            <p class="text-muted" style="margin:1rem 0 2rem;">
                Your request has been sent to the guide. You'll be able to pay once they accept.
            </p>
            <div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;">
                <a href="/my-bookings" class="btn btn-primary">View My Bookings</a>
                <a href="/guides"      class="btn btn-outline">Browse More Guides</a>
            </div>
        </div>
    </div>
</section>

<th:block th:replace="~{fragments :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
