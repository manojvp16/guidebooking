<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head('My Bookings')}"/>
</head>
<body>
<th:block th:replace="~{fragments :: navbar}"/>

<div class="page-header">
    <div class="container">
        <h1>My Bookings</h1>
        <p>Track all your guide tour bookings</p>
    </div>
</div>

<section class="section" style="padding-top:0;">
    <div class="container">

        <div th:if="${bookings.empty}" style="text-align:center;padding:4rem 0;">
            <div style="font-size:3rem;margin-bottom:1rem;">🗺️</div>
            <h3>No bookings yet</h3>
            <p class="text-muted" style="margin-bottom:1.5rem;">Start exploring and book your first tour!</p>
            <a href="/guides" class="btn btn-primary btn-lg">Browse Guides</a>
        </div>

        <div class="table-wrap" th:unless="${bookings.empty}">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Guide</th>
                    <th>City</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Payment</th>
                    <th>Review</th>
                    <th>Chat</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking, stat : ${bookings}">
                    <td class="text-muted" th:text="${stat.count}">1</td>
                    <td>
                        <a th:href="@{/guide/{id}(id=${booking.guide.id})}"
                           style="font-weight:600;color:var(--primary);"
                           th:text="${booking.guide.name}">Guide</a>
                    </td>
                    <td class="text-muted" th:text="${booking.guide.city}">City</td>
                    <td th:text="${booking.bookingDate}">Date</td>
                    <td>
                        <span th:class="'badge badge-' + ${booking.status.toLowerCase().replace('_','-')}"
                              th:text="${booking.status}">Status</span>
                    </td>
                    <td>
                        <a th:if="${booking.status == 'PAYMENT_PENDING'}"
                           th:href="@{/payment/{id}(id=${booking.id})}"
                           class="btn btn-gold btn-sm">💳 Pay Now</a>
                        <span th:if="${booking.status == 'CONFIRMED'}"
                              class="badge badge-success">✓ Paid</span>
                        <span th:if="${booking.status != 'PAYMENT_PENDING' and booking.status != 'CONFIRMED'}"
                              style="color:var(--text-muted);font-size:.85rem;">—</span>
                    </td>
                    <td>
                        <a th:if="${booking.status == 'CONFIRMED'}"
                           th:href="@{/review/{id}(id=${booking.id})}"
                           class="btn btn-outline btn-sm">⭐ Review</a>
                        <span th:unless="${booking.status == 'CONFIRMED'}"
                              style="color:var(--text-muted);font-size:.85rem;">—</span>
                    </td>
                    <!-- Chat available once booking is accepted (not PENDING or REJECTED) -->
                    <td>
                        <a th:if="${booking.status != 'PENDING' and booking.status != 'REJECTED'}"
                           th:href="@{/chat/{id}(id=${booking.id})}"
                           class="btn btn-primary btn-sm">💬 Chat</a>
                        <span th:unless="${booking.status != 'PENDING' and booking.status != 'REJECTED'}"
                              style="color:var(--text-muted);font-size:.85rem;">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top:2rem;text-align:center;" th:unless="${bookings.empty}">
            <a href="/guides" class="btn btn-outline">+ Book Another Guide</a>
        </div>

    </div>
</section>

<th:block th:replace="~{fragments :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
