<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head('Payment Status')}"/>
</head>
<body>
<th:block th:replace="~{fragments :: navbar}"/>

<section class="section">
    <div class="container" style="max-width:480px;">
        <div class="form-card" style="max-width:100%;text-align:center;padding:3rem;">

            <!-- Success -->
            <div th:if="${message == 'Payment Successful'}">
                <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
                <h2 style="color:var(--success);">Payment Successful!</h2>
                <p class="text-muted" style="margin:1rem 0 2rem;">
                    Your tour is confirmed. Have an amazing adventure!
                </p>
            </div>

            <!-- Failed -->
            <div th:unless="${message == 'Payment Successful'}">
                <div style="font-size:4rem;margin-bottom:1rem;">❌</div>
                <h2 style="color:var(--danger);">Payment Failed</h2>
                <p class="text-muted" style="margin:1rem 0 2rem;">
                    Something went wrong. Please try again from your bookings page.
                </p>
            </div>

            <div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;">
                <a href="/my-bookings" class="btn btn-primary">View My Bookings</a>
                <a href="/guides"      class="btn btn-outline">Browse Guides</a>
            </div>
        </div>
    </div>
</section>

<th:block th:replace="~{fragments :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
