<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: head('Leave Review')}"/>
</head>
<body>
<th:block th:replace="~{fragments :: navbar}"/>

<div class="page-header">
    <div class="container">
        <h1>Leave a Review</h1>
        <p>Share your experience to help other travelers</p>
    </div>
</div>

<section class="section" style="padding-top:2rem;">
    <div class="container" style="max-width:560px;">
        <div class="form-card" style="max-width:100%;">

            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;
                  padding-bottom:1.5rem;border-bottom:1px solid var(--border);">
                <div style="font-size:2.5rem;">⭐</div>
                <div>
                    <h3 style="margin:0;">Rate Your Guide</h3>
                    <p class="text-muted" style="font-size:.88rem;" th:text="${booking.guide.name}">Guide</p>
                </div>
            </div>

            <form th:action="@{/review/{id}(id=${booking.id})}" method="post">
<!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <div class="form-group">
                    <label>Your Rating</label>
                    <div style="display:flex;gap:.5rem;margin-top:.4rem;">
                        <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                            <label style="display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:.2rem;margin:0;">
                                <input type="radio" name="rating" th:value="${i}" required style="display:none;"/>
                                <span class="star-btn"
                                      th:attr="data-val=${i}"
                                      style="font-size:2.2rem;cursor:pointer;color:#d8d0c4;transition:color .15s;">★</span>
                                <span style="font-size:.72rem;color:var(--text-muted);" th:text="${i}"></span>
                            </label>
                        </th:block>
                    </div>
                </div>

                <div class="form-group">
                    <label>Your Comment</label>
                    <textarea name="comment" rows="5" required
                              placeholder="Tell us about your experience with this guide…"></textarea>
                </div>

                <button type="submit" class="btn btn-gold btn-lg" style="width:100%;justify-content:center;">
                    Submit Review
                </button>
            </form>
        </div>
    </div>
</section>

<th:block th:replace="~{fragments :: footer}"/>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
